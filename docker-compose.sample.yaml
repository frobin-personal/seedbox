#############################################################################
## Services are now located in separate files, in the services directory.  ##
#############################################################################

# Common network used by all services
networks: 
  default:
    name: "traefik-network"

# Common volumes used by at least 2 services
volumes:
  config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOST_CONFIG_PATH}
  torrents:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOST_MEDIA_PATH}
  downloads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOST_MEDIA_PATH}/${DOWNLOAD_SUBFOLDER}
  documents:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOST_MEDIA_PATH}/${DOCUMENTS_SUBFOLDER}
